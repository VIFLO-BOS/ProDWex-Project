	<!-- ==== Profile Loader ==== -->
	<script>
	$(document).ready(function(){
		$(function() {
		   loadResults(0);
		   
			$(window).on("scroll", function(){
				
				var scrollHeight = $(document).height();
				var scrollPosition = $(window).height() + $(window).scrollTop();
				 
				/* //if ((scrollHeight - scrollPosition) / scrollHeight === 0) {
				if ((scrollPosition >= scrollHeight - 20 && scrollPosition < scrollHeight + 20)) {
					var limitStart = $('.box-product-outer').length;
				    //alert(limitStart);
					loadResults(limitStart);
				}*/			 
				if (Math.round($(window).scrollTop()) + $(window).innerHeight()  == $(document).height()){
					//loadPagination();
					//$(".go-up").css("display","block").show("slow");
					var limitStart = $('.box-product-outer').length;
				    loadResults(limitStart);
				}
				
			});
			
			function loadResults(limitStart) {
				$("#loading").show();
				$.ajax({
					url: "platform.loader.php",
					type: "post",
					dataType: "json",
					data: {
						limitStart: limitStart
					},
					success: function(data) {
						$.each(data, function(key, value) {
						$("#results").append('<div id="'+value.username+'" class="col-xs-6 col-sm-3 col-md-3 box-product-outer">\
									<div class="box-product">\
										<div class="img-wrapper">\
											<a href="#">\
												<img alt="'+value.username+'" src="'+value.profileimg+'" width="200px" height="150px">\
											</a>\
											<div class="tags">\
												<span class="label-tags"><span class="label label-danger">'+value.instcode+'</span></span>\
											</div>\
										</div>\
										<h6>'+value.fullname+'</h6>\
										<button type="button" value="'+value.username+'" id="btnConnect" class="btn btn-info btn-xs"><span class="glyphicon glyphicon-link"></span> Connect</button>\
										<small><i class="ace-icon glyphicon glyphicon-link"></i>'+value.connections+'</small>\
									</div>\
								</div>'); 
						}); 
						$("#loading").hide();   
					}
				});
			};
		});
	});
	</script>
	
	<!-- ==== Establish Connection ==== -->
	<script>
	$(document).ready(function(){	
		$(function() {
			loadConnect(0);
			$(document).on('click','#btnConnect',function(){
				var connectMem = $(this).val();
				loadConnect(connectMem);
			});
			function loadConnect(connectMem) {
				//$("#connect").show();
				$.ajax({
					url: "platform.connect.php",
					type: "post",
					dataType: "json",
					data: {
						connectMem: connectMem
					},
					success: function(data) {
						$.each(data, function(key, value) {
							$("#"+value.username).html('<div style="height:205px;">A connection request has been sent to '+value.fullname+'</div>');
							$("#"+value.username).delay(1000).fadeOut('slow');
						   setTimeout(function() {
							   $("#"+value.username).hide(); 
						   }, 1500);
						}); 
						//$("#connect").hide(); 
					}
				});
			};
		});	
	});
	</script>
	
	<!-- ==== Accept Connection ==== -->
	<script>
	$(document).ready(function(){	
		$(function() {
			loadAccept(0);
			$(document).on('click','#btnAccept',function(){
				var connRequest = $(this).val();
				//alert('Connet to '+connRequest);
				loadAccept(connRequest);
			});
			function loadAccept(connRequest) {
				//$("#connect").show();
				$.ajax({
					url: "platform.accept.php",
					type: "post",
					dataType: "json",
					data: {
						connRequest: connRequest
					},
					success: function(data) {
						$.each(data, function(key, value) {
							$("#r"+value.username).html('<div style="height:205px;">You are now connected with '+value.fullname+'</div>');
							$("#r"+value.username).delay(1000).fadeOut('slow');
						   setTimeout(function() {
							   $("#r"+value.username).hide(); 
						   }, 1500);
						}); 
						//$("#connect").hide(); 
					}
				});
			};
		});	
	});
	</script>
